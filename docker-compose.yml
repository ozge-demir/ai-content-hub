services:
  postgres:
    image: postgres:17-alpine
    container_name: ai-content-hub-pg
    environment:
      POSTGRES_DB: aicontenthub
      POSTGRES_USER: aicontenthub
      POSTGRES_PASSWORD: aicontenthub
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
