ktor:
  deployment:
    port: "$PORT:8080"
  application:
    modules:
      - com.aicontenthub.ApplicationKt.module

db:
  url: "$DATABASE_URL:jdbc:postgresql://localhost:5432/aicontenthub"
  user: "$DATABASE_USER:aicontenthub"
  password: "$DATABASE_PASSWORD:aicontenthub"
  maxPoolSize: 10

session:
  secret: "$SESSION_SECRET:dev-only-change-me-via-SESSION_SECRET-env-in-prod"

ai:
  anthropicApiKey: "$ANTHROPIC_API_KEY:"
